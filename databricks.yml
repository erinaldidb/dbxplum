bundle:
  name: medplum-fhir-platform

variables:
  redis_password:
    description: "Redis server password"
    default: "medplum-redis-secret"
  lakebase_branch:
    description: "Lakebase branch"
    default: "production"

include:
  - "resources/*.yml"

targets:
  dev:
    default: true
    workspace:
      host: https://fevm-medplum.cloud.databricks.com
      profile: fevm-medplum
