command: ["node", "--max-old-space-size=1536", "start.js"]
env:
  - name: NODE_ENV
    value: "production"
  - name: REDIS_PASSWORD
    value: "change-me-redis-secret"
  - name: LAKEBASE_HOST
    value: "your-lakebase-endpoint.database.region.cloud.databricks.com"
  - name: LAKEBASE_PORT
    value: "5432"
  - name: LAKEBASE_DB
    value: "databricks_postgres"
  - name: LAKEBASE_USER
    value: "medplum_svc"
  - name: LAKEBASE_PASSWORD
    value: "change-me-db-password"
